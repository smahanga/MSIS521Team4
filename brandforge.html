<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandForge — AI Brand Kit Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C0B0F;
    --surface: #15141A;
    --surface-2: #1C1B22;
    --surface-3: #25232D;
    --border: #2A2833;
    --border-light: #35333F;
    --text: #EDECF0;
    --text-secondary: #9B99A6;
    --text-muted: #6B6878;
    --accent: #E8C872;
    --accent-dim: rgba(232,200,114,0.12);
    --accent-glow: rgba(232,200,114,0.06);
    --green: #5DD9A8;
    --green-dim: rgba(93,217,168,0.12);
    --coral: #F08A7E;
    --coral-dim: rgba(240,138,126,0.12);
    --blue: #7EB3F0;
    --blue-dim: rgba(126,179,240,0.12);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Outfit', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === NOISE TEXTURE OVERLAY === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* === AMBIENT GLOW === */
  .ambient-glow {
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,200,114,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .ambient-glow-2 {
    position: fixed;
    bottom: -300px; left: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(126,179,240,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* === LAYOUT === */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  /* === HEADER === */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }

  .logo-mark {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, #D4A84A 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(232,200,114,0.15);
  }

  .logo-mark svg { width: 20px; height: 20px; }

  .logo-text {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); }

  .topbar-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(232,200,114,0.15);
  }

  /* === HERO SECTION === */
  .hero {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.7s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: 46px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 14px;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero p {
    font-size: 17px;
    color: var(--text-secondary);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
    font-weight: 300;
  }

  /* === INPUT SECTION === */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 32px;
    animation: fadeUp 0.7s ease both;
    animation-delay: 0.1s;
  }

  .input-section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 22px;
  }

  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-group.full { grid-column: 1 / -1; }

  .form-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .form-input, .form-select, .form-textarea {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .form-input::placeholder, .form-textarea::placeholder {
    color: var(--text-muted);
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .form-select {
    appearance: none;
    cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236B6878' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }

  .form-select option { background: var(--surface-2); color: var(--text); }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  /* === TONE CHIPS === */
  .tone-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tone-chip {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-body);
    transition: all 0.2s;
  }

  .tone-chip:hover {
    border-color: var(--border-light);
    color: var(--text);
  }

  .tone-chip.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* === GENERATE BUTTON === */
  .generate-row {
    display: flex;
    justify-content: center;
    margin-top: 6px;
  }

  .btn-generate {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #D4A84A 100%);
    color: #0C0B0F;
    box-shadow: 0 4px 24px rgba(232,200,114,0.25);
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 32px rgba(232,200,114,0.35);
  }

  .btn-generate:active { transform: translateY(0); }

  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-generate svg { width: 18px; height: 18px; }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(12,11,15,0.2);
    border-top-color: #0C0B0F;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* === RESULTS SECTION === */
  .results-section {
    display: none;
    animation: fadeUp 0.6s ease;
  }

  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .results-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .results-title em { color: var(--accent); font-style: italic; }

  .results-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .result-card:nth-child(1) { animation-delay: 0.05s; }
  .result-card:nth-child(2) { animation-delay: 0.1s; }
  .result-card:nth-child(3) { animation-delay: 0.15s; }
  .result-card:nth-child(4) { animation-delay: 0.2s; }
  .result-card:nth-child(5) { animation-delay: 0.25s; grid-column: 1 / -1; }

  .result-card:hover {
    border-color: var(--border-light);
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .result-card.taglines::before { background: var(--accent); }
  .result-card.elevator::before { background: var(--blue); }
  .result-card.descriptions::before { background: var(--green); }
  .result-card.social::before { background: var(--coral); }
  .result-card.voice::before { background: linear-gradient(90deg, var(--accent), var(--coral)); }

  .result-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .result-card-label {
    display: flex; align-items: center; gap: 8px;
  }

  .result-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-icon svg { width: 16px; height: 16px; }

  .result-card-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .copy-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-body);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .copy-btn svg { width: 12px; height: 12px; }

  .result-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }

  .result-content .tagline-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    font-family: var(--font-display);
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .result-content .tagline-item:last-child { border-bottom: none; }

  .result-content .bio-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-secondary);
  }

  .result-content .description-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .result-content .description-item:last-child { border-bottom: none; }

  .result-content .desc-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .result-content .desc-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  .voice-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .voice-trait {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }

  .voice-trait-word {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .voice-trait-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* === SKELETON LOADING === */
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius-xs);
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-line {
    height: 16px;
    margin-bottom: 10px;
    border-radius: 4px;
  }

  .skeleton-line:last-child { width: 60%; margin-bottom: 0; }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .app { padding: 20px; }
    .hero h1 { font-size: 32px; }
    .form-grid { grid-template-columns: 1fr; }
    .results-grid { grid-template-columns: 1fr; }
    .result-card:nth-child(5) { grid-column: auto; }
    .voice-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="ambient-glow"></div>
<div class="ambient-glow-2"></div>

<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0C0B0F" stroke-width="2.5" stroke-linecap="round"><path d="M12 3L3 9l9 6 9-6-9-6z"/><path d="M3 15l9 6 9-6"/></svg>
      </div>
      <div class="logo-text">Brand<span>Forge</span></div>
    </div>
    <div class="topbar-badge">✦ Powered by Claude AI</div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Generate your entire<br><em>brand identity</em> in seconds</h1>
    <p>Tell us about your brand and our AI will craft taglines, bios, product descriptions, and a complete voice guide — ready to use.</p>
  </section>

  <!-- INPUT FORM -->
  <section class="input-section">
    <div class="input-section-title">Tell us about your brand</div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Brand Name</label>
        <input class="form-input" id="brandName" type="text" placeholder="e.g. Solaris, Moonbeam, Forge">
      </div>

      <div class="form-group">
        <label class="form-label">Industry</label>
        <select class="form-select" id="industry">
          <option value="">Select industry…</option>
          <option value="Technology / SaaS">Technology / SaaS</option>
          <option value="E-commerce / Retail">E-commerce / Retail</option>
          <option value="Health & Wellness">Health & Wellness</option>
          <option value="Finance / Fintech">Finance / Fintech</option>
          <option value="Education">Education</option>
          <option value="Food & Beverage">Food & Beverage</option>
          <option value="Fashion & Beauty">Fashion & Beauty</option>
          <option value="Travel & Hospitality">Travel & Hospitality</option>
          <option value="Creative Agency">Creative Agency</option>
          <option value="Real Estate">Real Estate</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Target Audience</label>
        <input class="form-input" id="audience" type="text" placeholder="e.g. Young professionals, small business owners">
      </div>

      <div class="form-group">
        <label class="form-label">Key Differentiator</label>
        <input class="form-input" id="differentiator" type="text" placeholder="e.g. AI-powered, sustainable, premium quality">
      </div>

      <div class="form-group full">
        <label class="form-label">Brand Description</label>
        <textarea class="form-textarea" id="description" placeholder="Briefly describe what your brand does, its mission, or its core value proposition…"></textarea>
      </div>

      <div class="form-group full">
        <label class="form-label">Brand Tone</label>
        <div class="tone-chips" id="toneChips">
          <button class="tone-chip" data-tone="Professional">Professional</button>
          <button class="tone-chip" data-tone="Friendly">Friendly</button>
          <button class="tone-chip" data-tone="Bold">Bold</button>
          <button class="tone-chip" data-tone="Luxurious">Luxurious</button>
          <button class="tone-chip" data-tone="Playful">Playful</button>
          <button class="tone-chip" data-tone="Minimalist">Minimalist</button>
          <button class="tone-chip" data-tone="Empowering">Empowering</button>
          <button class="tone-chip" data-tone="Trustworthy">Trustworthy</button>
        </div>
      </div>
    </div>

    <div class="generate-row">
      <button class="btn-generate" id="generateBtn" onclick="generateBrandKit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Generate Brand Kit
      </button>
    </div>
  </section>

  <!-- RESULTS -->
  <section class="results-section" id="resultsSection">
    <div class="results-header">
      <div class="results-title">Your <em>Brand Kit</em></div>
      <div class="results-meta" id="resultsMeta"></div>
    </div>

    <div class="results-grid" id="resultsGrid">
      <!-- Dynamically populated -->
    </div>
  </section>

</div>

<script>
  // Tone chip selection
  const toneChips = document.querySelectorAll('.tone-chip');
  const selectedTones = new Set();

  toneChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const tone = chip.dataset.tone;
      if (selectedTones.has(tone)) {
        selectedTones.delete(tone);
        chip.classList.remove('selected');
      } else {
        selectedTones.add(tone);
        chip.classList.add('selected');
      }
    });
  });

  // Copy functionality
  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Copied!';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(() => {
        btn.innerHTML = original;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1500);
    });
  }

  // Show skeleton loaders
  function showSkeletons() {
    const grid = document.getElementById('resultsGrid');
    const section = document.getElementById('resultsSection');
    section.classList.add('visible');
    document.getElementById('resultsMeta').textContent = 'Generating…';

    const cards = ['taglines', 'elevator', 'descriptions', 'social', 'voice'];
    const names = ['Taglines', 'Elevator Pitch', 'Product Descriptions', 'Social Media Bios', 'Brand Voice Guide'];

    grid.innerHTML = cards.map((c, i) => `
      <div class="result-card ${c}" style="animation-delay:${i*0.05}s">
        <div class="result-card-header">
          <div class="result-card-label">
            <div class="result-card-name">${names[i]}</div>
          </div>
        </div>
        <div class="result-content">
          <div class="skeleton skeleton-line" style="width:100%"></div>
          <div class="skeleton skeleton-line" style="width:90%"></div>
          <div class="skeleton skeleton-line" style="width:70%"></div>
        </div>
      </div>
    `).join('');

    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function generateBrandKit() {
    const brandName = document.getElementById('brandName').value.trim();
    const industry = document.getElementById('industry').value;
    const audience = document.getElementById('audience').value.trim();
    const differentiator = document.getElementById('differentiator').value.trim();
    const description = document.getElementById('description').value.trim();
    const tones = Array.from(selectedTones).join(', ');

    if (!brandName) {
      document.getElementById('brandName').focus();
      document.getElementById('brandName').style.borderColor = 'var(--coral)';
      setTimeout(() => document.getElementById('brandName').style.borderColor = '', 2000);
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Generating…';

    showSkeletons();

    const prompt = `You are a world-class brand strategist and copywriter. Generate a complete brand kit for the following brand. Return ONLY valid JSON, no markdown, no backticks, no preamble.

Brand: ${brandName}
Industry: ${industry || 'Not specified'}
Target Audience: ${audience || 'General'}
Key Differentiator: ${differentiator || 'Not specified'}
Description: ${description || 'Not provided'}
Desired Tone: ${tones || 'Professional, Modern'}

Return this exact JSON structure:
{
  "taglines": ["tagline1", "tagline2", "tagline3", "tagline4", "tagline5"],
  "elevator_pitch": "A 2-3 sentence elevator pitch",
  "descriptions": {
    "short": "One-line description (under 15 words)",
    "medium": "2-3 sentence description for website hero",
    "long": "Full paragraph for about page"
  },
  "social_bios": {
    "twitter": "Twitter/X bio (under 160 chars)",
    "linkedin": "LinkedIn summary (2-3 sentences)",
    "instagram": "Instagram bio with line breaks and emojis"
  },
  "brand_voice": {
    "traits": [
      {"word": "trait1", "description": "Brief explanation"},
      {"word": "trait2", "description": "Brief explanation"},
      {"word": "trait3", "description": "Brief explanation"},
      {"word": "trait4", "description": "Brief explanation"},
      {"word": "trait5", "description": "Brief explanation"},
      {"word": "trait6", "description": "Brief explanation"}
    ],
    "do": ["Writing guideline 1", "Writing guideline 2", "Writing guideline 3"],
    "dont": ["Avoid this 1", "Avoid this 2", "Avoid this 3"]
  }
}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const kit = JSON.parse(clean);

      renderResults(kit, brandName);
    } catch (err) {
      console.error('Error:', err);
      document.getElementById('resultsGrid').innerHTML = `
        <div class="result-card" style="grid-column:1/-1; text-align:center; padding:40px;">
          <div style="color:var(--coral); font-size:15px; font-weight:500; margin-bottom:8px;">Generation failed</div>
          <div style="color:var(--text-muted); font-size:13px;">Please try again. Error: ${err.message}</div>
        </div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Generate Brand Kit';
    }
  }

  function renderResults(kit, brandName) {
    const grid = document.getElementById('resultsGrid');
    document.getElementById('resultsMeta').textContent = `Generated for "${brandName}" • Just now`;

    const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

    grid.innerHTML = `
      <!-- TAGLINES -->
      <div class="result-card taglines">
        <div class="result-card-header">
          <div class="result-card-label">
            <div class="result-icon" style="background:var(--accent-dim);">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
            </div>
            <div class="result-card-name">Taglines</div>
          </div>
          <button class="copy-btn" onclick="copyText(this, '${kit.taglines.join('\\n')}')">${copyIcon} Copy</button>
        </div>
        <div class="result-content">
          ${kit.taglines.map(t => `<div class="tagline-item">${t}</div>`).join('')}
        </div>
      </div>

      <!-- ELEVATOR PITCH -->
      <div class="result-card elevator">
        <div class="result-card-header">
          <div class="result-card-label">
            <div class="result-icon" style="background:var(--blue-dim);">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </div>
            <div class="result-card-name">Elevator Pitch</div>
          </div>
          <button class="copy-btn" onclick="copyText(this, \`${kit.elevator_pitch}\`)">${copyIcon} Copy</button>
        </div>
        <div class="result-content">
          <div class="bio-text">${kit.elevator_pitch}</div>
        </div>
      </div>

      <!-- DESCRIPTIONS -->
      <div class="result-card descriptions">
        <div class="result-card-header">
          <div class="result-card-label">
            <div class="result-icon" style="background:var(--green-dim);">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
            </div>
            <div class="result-card-name">Descriptions</div>
          </div>
          <button class="copy-btn" onclick="copyText(this, \`${kit.descriptions.short}\\n\\n${kit.descriptions.medium}\\n\\n${kit.descriptions.long}\`)">${copyIcon} Copy</button>
        </div>
        <div class="result-content">
          <div class="description-item">
            <div class="desc-label">One-liner</div>
            <div class="desc-text">${kit.descriptions.short}</div>
          </div>
          <div class="description-item">
            <div class="desc-label">Website Hero</div>
            <div class="desc-text">${kit.descriptions.medium}</div>
          </div>
          <div class="description-item">
            <div class="desc-label">About Page</div>
            <div class="desc-text">${kit.descriptions.long}</div>
          </div>
        </div>
      </div>

      <!-- SOCIAL BIOS -->
      <div class="result-card social">
        <div class="result-card-header">
          <div class="result-card-label">
            <div class="result-icon" style="background:var(--coral-dim);">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--coral)" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
            </div>
            <div class="result-card-name">Social Media Bios</div>
          </div>
          <button class="copy-btn" onclick="copyText(this, \`Twitter: ${kit.social_bios.twitter}\\nLinkedIn: ${kit.social_bios.linkedin}\\nInstagram: ${kit.social_bios.instagram}\`)">${copyIcon} Copy</button>
        </div>
        <div class="result-content">
          <div class="description-item">
            <div class="desc-label">Twitter / X</div>
            <div class="desc-text">${kit.social_bios.twitter}</div>
          </div>
          <div class="description-item">
            <div class="desc-label">LinkedIn</div>
            <div class="desc-text">${kit.social_bios.linkedin}</div>
          </div>
          <div class="description-item">
            <div class="desc-label">Instagram</div>
            <div class="desc-text" style="white-space:pre-line">${kit.social_bios.instagram}</div>
          </div>
        </div>
      </div>

      <!-- BRAND VOICE -->
      <div class="result-card voice">
        <div class="result-card-header">
          <div class="result-card-label">
            <div class="result-icon" style="background:linear-gradient(135deg, var(--accent-dim), var(--coral-dim));">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
            </div>
            <div class="result-card-name">Brand Voice Guide</div>
          </div>
        </div>
        <div class="result-content">
          <div class="voice-grid" style="margin-bottom:18px;">
            ${kit.brand_voice.traits.map(t => `
              <div class="voice-trait">
                <div class="voice-trait-word">${t.word}</div>
                <div class="voice-trait-desc">${t.description}</div>
              </div>
            `).join('')}
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div>
              <div class="desc-label" style="color:var(--green); margin-bottom:10px;">✓ Do</div>
              ${kit.brand_voice.do.map(d => `<div style="font-size:13px; color:var(--text-secondary); padding:6px 0; border-bottom:1px solid var(--border);">${d}</div>`).join('')}
            </div>
            <div>
              <div class="desc-label" style="color:var(--coral); margin-bottom:10px;">✕ Don't</div>
              ${kit.brand_voice.dont.map(d => `<div style="font-size:13px; color:var(--text-secondary); padding:6px 0; border-bottom:1px solid var(--border);">${d}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
